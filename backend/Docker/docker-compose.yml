version: "3.8"

services:
    postgres:
        image: postgres:15
        container_name: postgres
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5433:5432"
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
            - postgres_data:/var/lib/postgresql/data
        networks:
            - Library-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    opensearch:
        image: opensearchproject/opensearch:2.11.0
        container_name: opensearch
        environment:
            - discovery.type=single-node
            - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
        ports:
            - "9200:9200"
        volumes:
            - opensearch-data:/usr/share/opensearch/data
        networks:
            - Library-net

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:2.11.0
        container_name: opensearch-dashboards
        ports:
            - "5601:5601"
        environment:
            OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
            OPENSEARCH_USERNAME: admin
            OPENSEARCH_PASSWORD: admin
            OPENSEARCH_SSL_VERIFICATIONMODE: none
        depends_on:
            - opensearch
        networks:
            - Library-net

    keycloak-db:
        image: postgres:15
        container_name: keycloak-db
        restart: always
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: keycloak
        volumes:
            - keycloak_db_data:/var/lib/postgresql/data
        networks:
            - Library-net

    keycloak:
        image: quay.io/keycloak/keycloak:24.0.1
        container_name: keycloak
        command:
            - start-dev
            - --spi-theme-cache-themes=false
            - --spi-theme-cache-templates=false
        restart: always
        depends_on:
            - keycloak-db
        environment:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak
            KC_HOSTNAME: localhost
            KC_HOSTNAME_PORT: 8181
            KC_HOSTNAME_STRICT: "false"
            KC_HTTP_ENABLED: "true"
        ports:
            - "8181:8080"
        networks:
            - Library-net
        volumes:
            - ../keycloak-themes:/opt/keycloak/themes

    broker:
        image: apache/kafka:latest
        container_name: broker
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        networks:
            - Library-net

    schema-registry:
        image: confluentinc/cp-schema-registry:7.5.0
        container_name: schema-registry
        ports:
            - "9091:8081"
        environment:
            SCHEMA_REGISTRY_HOST_NAME: schema-registry
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092
            SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
        depends_on:
            - broker
        networks:
            - Library-net

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8085:8080"
        environment:
            - KAFKA_CLUSTERS_0_NAME=local
            - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=broker:9092
        depends_on:
            - broker
        networks:
            - Library-net

    authoring-service:
        build:
            context: ..
            dockerfile: Authoring-service/Dockerfile
        container_name: authoring-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authoringservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8081:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net

    catalog-service:
        build:
            context: ..
            dockerfile: Catalog-Service/Dockerfile
        container_name: catalog-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalogservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8082:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net

    user-service:
        build:
            context: ..
            dockerfile: User-service/Dockerfile
        container_name: user-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8083:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net

    author-service:
        build:
            context: ..
            dockerfile: Author-Service/Dockerfile
        container_name: author-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authorservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8084:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net

    api-gateway:
        build:
            context: ..
            dockerfile: Api-gateway/Dockerfile
        container_name: api-gateway
        restart: on-failure
        environment:
            SPRING_APPLICATION_NAME: api-gateway
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8089:8080"
        depends_on:
            - author-service
            - authoring-service
            - user-service
            - catalog-service
            - keycloak
        networks:
            - Library-net

    search-service:
        build:
            context: ..
            dockerfile: Search-service/Dockerfile
        container_name: search-service
        restart: on-failure
        environment:
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
            SPRING_ELASTICSEARCH_URIS: http://opensearch:9200
            SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:9092
            SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
            SPRING_ELASTICSEARCH_USERNAME: admin
            SPRING_ELASTICSEARCH_PASSWORD: admin
            SPRING_ELASTICSEARCH_SSL_VERIFICATION_MODE: none
        ports:
            - "8086:8080"
        depends_on:
            - broker
            - schema-registry
            - opensearch
        networks:
            - Library-net

    order-service:
        build:
            context: ..
            dockerfile: order-service/Dockerfile
        container_name: order-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8087:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net

networks:
    Library-net:
        driver: bridge

volumes:
    postgres_data:
    keycloak_db_data:
    opensearch-data:
