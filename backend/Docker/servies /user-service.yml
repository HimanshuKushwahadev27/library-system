version: "3.8"

services:
    user-service:
        build:
            context: ../..
            dockerfile: User-service/Dockerfile
        container_name: user-service
        restart: on-failure
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userservice_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Library-realm
        ports:
            - "8083:8080"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - Library-net



networks:
  Library-net:
    external: true