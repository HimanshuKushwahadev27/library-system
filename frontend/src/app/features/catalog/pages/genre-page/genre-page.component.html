<div class="genres-container">

  <h2>Categories</h2>

  @if (genres$ | async; as genres) {

    <div class="genres-grid">

      @for (genre of genres; track genre.genreId) {

        <div class="genre-card">
          {{ genre.name }}
        </div>

      }

    </div>

  } @else {

    <p>Loading genres...</p>

  }

</div>
